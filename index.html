<!DOCTYPE html>
<html>
<head>
<title>WhatsApp UI</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: white;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

/* MAIN CONTAINER */
.chat-container {
  width: 380px;
  height: 650px;
  background: #efeae2;
  display: flex;
  flex-direction: column;
}

/* HEADER */
.header {
  background: #075e54;
  color: white;
  padding: 12px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.left-header {
  display: flex;
  align-items: center;
  gap: 10px;
}

.profile {
  width: 35px;
  height: 35px;
  border-radius: 50%;
  background: grey;
}

.name {
  font-weight: 600;
}

/* CHAT AREA */
.chat-box {
  flex: 1;
  padding: 10px;
  overflow-y: auto;
}

/* MESSAGE */
.msg {
  padding: 8px 10px;
  margin: 5px 0;
  max-width: 70%;
  border-radius: 8px;
}

/* LEFT MESSAGE */
.msg-left {
  background: white;
}

/* RIGHT MESSAGE */
.msg-right {
  background: #dcf8c6;
  margin-left: auto;
}

/* INPUT BAR */
.input-bar {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px;
  background: white;
}

/* INPUT */
.input-bar input {
  flex: 1;
  padding: 10px;
  border: 1px solid #ccc;
  outline: none;
  border-radius: 20px;
}

/* ICONS */
.icon {
  font-size: 20px;
  cursor: pointer;
}

/* RIGHT ICONS */
.right-icons {
  display: flex;
  gap: 10px;
  margin-left: auto;
}

</style>
</head>

<body>

<div class="chat-container">

  <!-- HEADER -->
  <div class="header">
    <div class="left-header">
      <div class="profile"></div>
      <div class="name">Virat Kohli</div>
    </div>
    <div>📹 📞 ⋮</div>
  </div>

  <!-- CHAT -->
  <div class="chat-box">
    <div class="msg msg-left">Hey Virat</div>
    <div class="msg msg-right">Hello</div>
    <div class="msg msg-left">How do you stay focused?</div>
    <div class="msg msg-right">Discipline and consistency</div>
  </div>

  <!-- INPUT -->
  <div class="input-bar">
    <div class="icon">😊</div>
    <input type="text" placeholder="Message">

    <div class="right-icons">
      <div class="icon">📎</div>
      <div class="icon">💰</div>
      <div class="icon">📷</div>
      <div class="icon">🎤</div>
    </div>
  </div>

</div>

</body>
</html>
