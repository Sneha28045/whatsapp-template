<!DOCTYPE html>
<html>
  <head>
    <title>Hello, World!</title>
    <style>
      *{
        margin:0;
        padding:0;
        box-sizing:border-box;
        
      }
      body{
        background:white;
        display:flex;
        justify-content:center;
        align-items:center;
      }
      .chat-container{
        background:#efeae2;
        height:400px;
        width:300px;
        border-radius:10px;
        overflow:hidden;
        display:flex;
        flex-direction:column;
        box-shadow:0 10px 25px rgba(0,0,0,0.2);
      }
      .header{
        background:green;
        width:300px;
        height:50px;
        color:white;
        display:flex;
        align-items:center;
        padding:10px;
        justify-content:space-between;
      }
      .profile{
        height:35px;
        width:35px;
        border-radius:50%;
        background:grey;
        margin-left:2px;
      }
      .name{
        display:flex;
        align-item:left;
         white-space: nowrap;
      }
      .left-header{
        margin-left:3px;
        display:flex;
        align-items:center;
        gap:10px;
      }
      .right-icons{
        font-size:15px;
        display:flex;
        gap:10px;
      }
      .chat-box{
      flex:1;
      display:flex;
      flex-direction:column;
      padding:10px;
      overflow-y:auto;
        
      }
      .message{
        padding:10px 20px;
        border-radius:10px;
        max-width:70%;
      }
      .message-left{
        background:white;
        align-self:flex-start;
      }
      .message-right{
        background:green;
        align-self:flex-end;
      }
      .input-bar{
        background:white;
        display:flex;
        align-items:center;
        
        padding:8px 12px;
      
        
      }
      input{
        border:none;
        outline:none;
        padding:8px 10px;
        flex:1;
      }
      
      .text{
        display:flex;
        margin-left:8px;
      }
      .icons{
        font-size:18px;
        gap:10px;
      }
    </style>
  </head>
  <body>
      <div class="chat-container">
        <div class="header">
          <div class="left-header">
            <div class="profile"></div>
            <div class="name">virat kohli</div>
          </div>
          <div class="right-icons">
             <span>📹</span>
             <span>📞</span>
            <span>⋮</span>
          </div>
        </div>
        <div class="chat-box">
          <div class="message message-left">hi</div>
          <div class="message message-right">hello</div>
          <div class="message message-left">how are you</div>
          <div class="message message-right">i am good</div>
          <div class="message message-left">how your carrer going</div>
          <div class="message message-right">good </div>
        </div>
        <div class="input-bar">
          <div class="left-icons">😊</div>
          <input type="text" placeholder="enter message">
          <div class="icon">📎</div>
          <div class="icon">🎤</div>
        </div>
     
      </div>
  </body>
</html>
